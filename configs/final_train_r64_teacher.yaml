model_path: Qwen/Qwen3-VL-2B-Instruct
data_path: ./datasets/textvqa_hf/data/train-*.parquet
prepared_data_dir: ./data/prepared_textvqa_final_r64_seed{seed}
output_dir: ./outputs/textvqa_qwen3vl_final_r64_teacher_seed{seed}

seed: 1
max_train_samples: 40960
max_steps: 1024
max_train_seconds: 0

max_pixels: 200704
min_pixels: 100352
max_seq_length: 1024
attn_implementation: eager
use_ocr_tokens: true
max_ocr_tokens: 16
ocr_strategy: question_aware

per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.00001
warmup_ratio: 0.003
weight_decay: 0.0
logging_steps: 5
dataloader_num_workers: 2

lora_r: 64
lora_alpha: 24
lora_dropout: 0.05
target_preset: lm_all
use_dora: false
use_rslora: true
